appId: ai.openclaw.desktop
productName: OpenClaw
directories:
  output: build
  buildResources: assets

files:
  - dist/**
  - ui/**
  - package.json

extraResources:
  - from: ../../dist
    to: ../Resources/dist
  - from: ../../dist/control-ui
    to: ../Resources/control-ui
  - from: staging-node-modules
    to: ../Resources/node_modules
  - from: ../../docs/reference/templates
    to: ../Resources/docs/reference/templates
  - from: config
    to: config
  - from: resources
    to: resources

mac:
  target:
    - dmg
    - zip
  category: public.app-category.utilities
  icon: assets/icon.icns

win:
  target:
    - nsis
  icon: assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  createDesktopShortcut: true
  createStartMenuShortcut: true
  shortcutName: OpenClaw
